<section id="portafolio"
  aria-labelledby="portafolio-title" class="relative py-0">
  <div class="bg-[#F5F5F7] rounded-tl-[80px] px-6 lg:px-16 pt-28 pb-16">

    <!-- HEADER -->
    <div class="max-w-7xl mx-auto mb-12 sm:mb-12">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-4 h-4 rounded-full bg-gradient-to-r from-gray-400 to-gray-600"></div>
        <h2 id="portafolio-title" class="tracking-[0.4em] text-xs sm:text-sm text-gray-600">PORTAFOLIO</h2>
        <div class="flex-1 h-[1px] bg-gray-300"></div>
      </div>

      <p class="text-gray-600 max-w-3xl text-base sm:text-lg leading-relaxed">
        Explora algunos de nuestros proyectos en <strong>diseño web, branding, marketing digital y experiencias visuales</strong>  creadas para marcas modernas.
      </p>
    </div>

    <!-- CARRUSEL -->
    <div class="relative max-w-7xl mx-auto">

      <!-- FLECHA IZQUIERDA -->
      <button   type="button"
      aria-label="Proyecto anterior" (click)="prev()"
        class="flex absolute left-2 sm:left-0 lg:-left-6 top-1/2 -translate-y-1/2 z-10 w-8 h-8 sm:w-10 sm:h-10 items-center justify-center rounded-full bg-white/70 backdrop-blur hover:bg-white transition shadow-sm">
        <span class="text-lg text-gray-600">‹</span>
      </button>

      <!-- VIEWPORT -->
      <div class="overflow-hidden">

        <!-- TRACK -->
        <div class="flex transition-transform duration-500 ease-in-out"
          [style.transform]="'translateX(-' + currentIndex * getSlideWidth() + '%)'">

          <!-- CARD -->
          <article *ngFor="let item of projects"
            class="w-full sm:w-1/2 lg:w-1/3 flex-shrink-0 px-2 sm:px-3">

            <div class="bg-white rounded-[28px] shadow-sm p-3 sm:p-4 hover:-translate-y-1 hover:shadow-xl transition-all duration-300">

              <div class="relative rounded-[24px] overflow-hidden">
                <img ngSrc="{{ item.img }}"
                  width="800"
                  height="1000"
                  loading="lazy"
                  [alt]="item.title"
                  class="w-full h-[260px] sm:h-[320px] lg:h-[380px] object-cover"
                >
                
              </div>

              <p class="text-center text-gray-700 mt-3 sm:mt-4 text-base sm:text-lg">
                {{ item.title }}
              </p>

            </div>

          </article>

        </div>
      </div>

      <!-- FLECHA DERECHA -->
      <button  type="button"
      aria-label="Siguiente proyecto" (click)="next()"
        class="flex absolute right-2 sm:right-0 lg:-right-6 top-1/2 -translate-y-1/2 z-10 w-8 h-8 sm:w-10 sm:h-10 items-center justify-center rounded-full bg-white/70 backdrop-blur hover:bg-white transition shadow-sm">
        <span class="text-lg text-gray-600">›</span>
      </button>

    </div>

  </div>
</section>
