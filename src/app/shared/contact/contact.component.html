<section class="relative pt-4">

  <!-- CONTENEDOR BLANCO CON CURVA -->
  <div class="bg-[#F5F5F7] rounded-tl-[120px] px-6 lg:px-16 py-16"><br><br><br>

    <!-- HEADER -->
    <div class="max-w-7xl mx-auto mb-12">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-4 h-4 rounded-full bg-gradient-to-r from-gray-400 to-gray-600"></div>
        <span class="tracking-[0.4em] text-sm text-gray-600">CONTACTO</span>
        <div class="flex-1 h-[1px] bg-gray-300"></div>
      </div>

      <h2 class="text-2xl lg:text-3xl font-semibold text-gray-800 mb-4">
        ¿Listo para dejar de perder clientes?
      </h2>

      <p class="text-gray-600 max-w-2xl">
        Hablemos y construyamos productos que realmente vendan, cuéntanos tu idea.
        Nosotros la convertimos en resultados.
      </p>
    </div>

    <!-- GRID -->
    <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">

      <!-- IMAGEN -->
      <div class="relative flex justify-center lg:justify-start">

        <div class="relative">
          <img 
            src="assets/imgs/imgContact.png"
            alt="Contacto"
            class="w-[340px] sm:w-[380px] lg:w-[450px] xl:w-[520px] rounded-xl"
          >

         
        </div>
      </div>

      <!-- FORMULARIO -->
      <!-- FORMULARIO -->
<form 
  action="https://formspree.io/f/xvzlajzd" 
  method="POST"
  class="space-y-6"
>

  <!-- Nombre -->
  <div>
    <label class="block text-sm text-gray-700 mb-2">Nombre completo</label>
    <input 
      type="text"
      name="nombre"
      required
      placeholder="Tu nombre"
      class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400">
  </div>

  <!-- Correo -->
  <div>
    <label class="block text-sm text-gray-700 mb-2">Correo</label>
    <input 
      type="email"
      name="email"
      required
      placeholder="tu@email.com"
      class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400">
  </div>

  <!-- Teléfono -->
  <div>
    <label class="block text-sm text-gray-700 mb-2">Cel</label>
    <input 
      type="text"
      name="telefono"
      placeholder="Tu número"
      class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400">
  </div>

  <!-- Mensaje -->
  <div>
    <label class="block text-sm text-gray-700 mb-2">Descripción de solicitud</label>
    <textarea 
      name="mensaje"
      rows="4"
      required
      placeholder="Cuéntanos tu idea..."
      class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400"></textarea>
  </div>

  <!-- Campo oculto PRO -->
  <input type="hidden" name="_subject" value="Nuevo lead desde landing">

  <!-- Botón -->
  <button
    type="submit"
    class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800 transition w-full">
    Enviar solicitud
  </button>

</form>

    </div>

  </div>
</section>
