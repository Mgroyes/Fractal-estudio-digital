<section
  id="contacto"
  class="relative pt-0"
>

  <div
    class="bg-[#F5F5F7] px-4 sm:px-6 lg:px-16 py-12 sm:py-16"
  >

    <!-- HEADER -->
    <div class="max-w-7xl mx-auto mb-12">

      <div class="flex items-center gap-4 mb-6">

        <div
          class="w-4 h-4 rounded-full bg-gradient-to-r from-gray-400 to-gray-600"
        ></div>

        <span
          class="tracking-[0.4em] text-sm text-gray-600"
        >
          CONTACTO
        </span>

        <div class="flex-1 h-[1px] bg-gray-300"></div>

      </div>

      <!-- SEO -->
      <h2
        class="text-2xl lg:text-3xl font-semibold text-gray-800 mb-4"
      >
        ¿Listo para dejar de perder clientes?
      </h2>

      <p
        class="text-gray-600 max-w-2xl leading-relaxed"
      >
        Hablemos y construyamos productos digitales que realmente vendan.
        Cuéntanos tu idea y transformémosla en resultados reales.
      </p>

    </div>

    <!-- GRID -->
    <div
      class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center"
    >

      <!-- IMAGEN -->
      <div
        class="relative flex justify-center lg:justify-start"
      >

        <div class="relative">

          <img
            ngSrc="assets/imgs/img-contact.webp"
            width="520"
            height="620"
            sizes="(max-width: 1024px) 100vw, 50vw"
            loading="lazy"
            alt="Equipo de diseño y desarrollo digital atendiendo clientes"
            class="w-[340px] sm:w-[380px] lg:w-[450px] xl:w-[520px] rounded-xl object-cover"
          />

        </div>

      </div>

      <!-- FORMULARIO -->
      <form
        action="https://formspree.io/f/xvzlajzd"
        method="POST"
        class="space-y-6"
      >

        <!-- NOMBRE -->
        <div>

          <label
            for="nombre"
            class="block text-sm text-gray-700 mb-2"
          >
            Nombre completo
          </label>

          <input
            id="nombre"
            type="text"
            name="nombre"
            required
            autocomplete="name"
            placeholder="Tu nombre"
            class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400"
          />

        </div>

        <!-- EMAIL -->
        <div>

          <label
            for="email"
            class="block text-sm text-gray-700 mb-2"
          >
            Correo electrónico
          </label>

          <input
            id="email"
            type="email"
            name="email"
            required
            autocomplete="email"
            inputmode="email"
            placeholder="tu@email.com"
            class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400"
          />

        </div>

        <!-- TELÉFONO -->
        <div>

          <label
            for="telefono"
            class="block text-sm text-gray-700 mb-2"
          >
            Celular
          </label>

          <input
            id="telefono"
            type="tel"
            name="telefono"
            autocomplete="tel"
            inputmode="tel"
            placeholder="Tu número"
            class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400"
          />

        </div>

        <!-- MENSAJE -->
        <div>

          <label
            for="mensaje"
            class="block text-sm text-gray-700 mb-2"
          >
            Descripción de solicitud
          </label>

          <textarea
            id="mensaje"
            name="mensaje"
            rows="4"
            required
            placeholder="Cuéntanos tu idea..."
            class="w-full rounded-xl border border-gray-300 bg-transparent px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-400"
          ></textarea>

        </div>

        <!-- SUBJECT -->
        <input
          type="hidden"
          name="_subject"
          value="Nuevo lead desde landing"
        />

        <!-- ANTI SPAM -->
        <input
          type="text"
          name="_gotcha"
          class="hidden"
        />

        <!-- BOTÓN -->
        <button
          type="submit"
          class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800 transition duration-300 w-full"
        >
          Enviar solicitud
        </button>

      </form>

    </div>

  </div>

</section>
